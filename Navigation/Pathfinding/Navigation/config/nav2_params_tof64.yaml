planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      tolerance: 0.35
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0

      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      minimum_turning_radius: 0.20

      reverse_penalty: 2.0
      change_penalty: 0.2
      non_straight_penalty: 1.2
      cost_penalty: 2.0

      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      lookup_table_size: 20.0
      smooth_path: true

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.01
      movement_time_allowance: 120.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 0.50

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      debug_trajectory_details: false

      min_vel_x: 0.0
      min_vel_y: 0.0

      max_vel_x: 0.50
      max_vel_y: 0.0
      max_vel_theta: 0.60

      min_speed_xy: 0.0
      max_speed_xy: 0.50
      min_speed_theta: 0.0

      acc_lim_x: 0.3
      acc_lim_y: 0.0
      acc_lim_theta: 0.8

      decel_lim_x: -0.3
      decel_lim_y: 0.0
      decel_lim_theta: -0.8

      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20

      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2

      xy_goal_tolerance: 0.35
      trans_stopped_velocity: 0.08
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist

      BaseObstacle.scale: 0.02

      PathAlign.scale: 16.0
      PathAlign.forward_point_distance: 0.3

      GoalAlign.scale: 12.0
      GoalAlign.forward_point_distance: 0.3

      PathDist.scale: 32.0
      GoalDist.scale: 24.0

      RotateToGoal.scale: 15.0
      RotateToGoal.slowing_factor: 2.0
      RotateToGoal.lookahead_time: -1.0

bt_navigator:
  ros__parameters:
    use_sim_time: false

    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom

    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    navigators: ["navigate_to_pose"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

behavior_server:
  ros__parameters:
    use_sim_time: false

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    cycle_frequency: 10.0

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"

    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.2

    simulate_ahead_time: 2.0
    max_rotational_vel: 0.5
    min_rotational_vel: 0.05
    rotational_acc_lim: 1.0

velocity_smoother:
  ros__parameters:
    use_sim_time: false

    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    max_velocity: [0.50, 0.0, 0.60]
    min_velocity: [0.0, 0.0, -0.60]

    max_accel: [0.3, 0.0, 0.8]
    max_decel: [-0.3, 0.0, -0.8]

    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false

      global_frame: map
      robot_base_frame: base_footprint

      update_frequency: 1.0
      publish_frequency: 1.0
      transform_tolerance: 0.5

      resolution: 0.05
      track_unknown_space: true

      robot_radius: 0.35

      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.15
        cost_scaling_factor: 3.0

      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false

      global_frame: odom
      robot_base_frame: base_footprint

      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 0.5

      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05

      robot_radius: 0.35

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true

        # New:
        # scan      = merged 2-LiDAR LaserScan
        # tof_cloud = 64 ToF points as PointCloud2
        observation_sources: scan tof_cloud

        scan:
          topic: /scan_multi
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0

        tof_cloud:
          topic: /tof_cloud
          max_obstacle_height: 1.0
          min_obstacle_height: 0.0
          clearing: false
          marking: true
          data_type: "PointCloud2"
          obstacle_max_range: 4.0
          obstacle_min_range: 0.03

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 3.0

      always_send_full_costmap: true