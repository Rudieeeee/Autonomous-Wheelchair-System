planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.50
      allow_unknown: false
      max_iterations: 1000000
      max_planning_time: 2.0
      cost_travel_multiplier: 50.0
      use_final_approach_orientation: true
      smooth_path: true


controller_server:
  ros__parameters:
    use_sim_time: false
    odom_topic: /odom
    controller_frequency: 20.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.20
      required_heading_change: 0.10
      movement_time_allowance: 120.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 6.28 

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.20

      lookahead_dist: 0.35
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.55
      lookahead_time: 1.0
      transform_tolerance: 0.3
      use_velocity_scaled_lookahead_dist: true

      min_approach_linear_velocity: 0.01
      approach_velocity_scaling_dist: 0.9

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.55
      regulated_linear_scaling_min_speed: 0.01

      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 10.0
      rotate_to_heading_min_angle: 0.436332313
      max_angular_accel: 10.0
      stateful: true
      max_robot_pose_search_dist: 10.0

      allow_reversing: false


bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"


behavior_server:
  ros__parameters:
    use_sim_time: false

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    cycle_frequency: 100.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"

    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.3
    simulate_ahead_time: 2.0

    max_rotational_vel: 1.20
    min_rotational_vel: 0.5
    rotational_acc_lim: 1.0


velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    max_velocity: [0.20, 0.0, 0.5]
    min_velocity: [-0.05, 0.0, -0.5]

    max_accel: [0.10, 0.0, 0.30]
    max_decel: [-0.25, 0.0, -0.45]

    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.0, 0.05]
    velocity_timeout: 0.5


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint
      update_frequency: 5.0
      publish_frequency: 1.0
      transform_tolerance: 0.5
      resolution: 0.05
      track_unknown_space: true

      footprint: "[[0.45, 0.30], [0.45, -0.30], [-0.45, -0.30], [-0.45, 0.30]]"
      footprint_padding: 0.05

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan tof_scan

        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 7.0
          raytrace_min_range: 0.0
          obstacle_max_range: 7.5
          obstacle_min_range: 0.0
          obstacle_persistence: 0.0

        tof_scan:
          topic: /tof_scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 2.0
          raytrace_min_range: 0.0
          obstacle_max_range: 1.5
          obstacle_min_range: 0.05
          obstacle_persistence: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 0.8

      always_send_full_costmap: true


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 20.0
      publish_frequency: 5.0
      transform_tolerance: 0.5

      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05

      footprint: "[[0.45, 0.30], [0.45, -0.30], [-0.45, -0.30], [-0.45, 0.30]]"
      footprint_padding: 0.05

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan tof_scan

        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0
          obstacle_persistence: 0.0

        tof_scan:
          topic: /tof_scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.05
          obstacle_persistence: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.05
        cost_scaling_factor: 0.5

      always_send_full_costmap: true


tof_safety_limiter:
  ros__parameters:
    use_sim_time: false

    input_cmd_vel_topic: /cmd_vel
    output_cmd_vel_topic: /cmd_vel_safe

    scan_topics:
      - /scan
      - /tof_scan

    scan_timeout: 0.50

    linear_threshold: 0.03
    angular_threshold: 0.05

    max_slowdown_scale: 0.50
    stop_distance: 0.70

    forward_slowdown_distance: 1.70
    turning_slowdown_distance: 1.10
    reverse_slowdown_distance: 0.60

    forward_straight_angle_min_deg: -35.0
    forward_straight_angle_max_deg: 35.0

    forward_turning_left_angle_min_deg: -20.0
    forward_turning_left_angle_max_deg: 70.0

    forward_turning_right_angle_min_deg: -70.0
    forward_turning_right_angle_max_deg: 20.0

    turning_in_place_left_angle_min_deg: 0.0
    turning_in_place_left_angle_max_deg: 120.0

    turning_in_place_right_angle_min_deg: -120.0
    turning_in_place_right_angle_max_deg: 0.0

    reverse_angle_min_deg: 145.0
    reverse_angle_max_deg: -145.0