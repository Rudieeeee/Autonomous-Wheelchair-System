planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"

      tolerance: 0.35
      allow_unknown: false

      max_iterations: 1000000
      max_planning_time: 5.0

      cost_travel_multiplier: 2.0

      # Do not force the wheelchair to match a final heading.
      # This prevents unnecessary final rotation.
      use_final_approach_orientation: false

      smooth_path: true


controller_server:
  ros__parameters:
    use_sim_time: false
    odom_topic: /odom

    controller_frequency: 20.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.02
      movement_time_allowance: 120.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"

      # Stateful means once XY is reached, it does not keep resetting goal checks.
      stateful: true

      # Position margin.
      xy_goal_tolerance: 0.40

      # BIG heading margin.
      # 1.57 rad = about 90 degrees.
      # This means heading overshoot near the goal is not a big problem.
      yaw_goal_tolerance: 1.57

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.20

      # Larger lookahead makes the wheelchair less nervous.
      # It follows the path more smoothly instead of chasing every small heading error.
      lookahead_dist: 0.90
      min_lookahead_dist: 0.60
      max_lookahead_dist: 1.20
      lookahead_time: 2.0

      transform_tolerance: 0.3

      use_velocity_scaled_lookahead_dist: true

      # Slows down near the goal.
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.9

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5

      # Keep regulation enabled, but not too aggressive.
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.55
      regulated_linear_scaling_min_speed: 0.08

      # IMPORTANT:
      # Disable rotate-to-heading so the wheelchair does not jerk around
      # trying to perfectly align with the path heading.
      use_rotate_to_heading: false

      # These remain defined but are mostly inactive because use_rotate_to_heading is false.
      rotate_to_heading_angular_vel: 0.20
      rotate_to_heading_min_angle: 1.57
      max_angular_accel: 0.35

      allow_reversing: false


bt_navigator:
  ros__parameters:
    use_sim_time: false

    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom

    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    navigators: ["navigate_to_pose"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"


behavior_server:
  ros__parameters:
    use_sim_time: false

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    cycle_frequency: 10.0

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"

    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.3

    simulate_ahead_time: 2.0

    # Softer behavior limits.
    max_rotational_vel: 0.22
    min_rotational_vel: 0.05
    rotational_acc_lim: 0.35


velocity_smoother:
  ros__parameters:
    use_sim_time: false

    smoothing_frequency: 20.0
    scale_velocities: false

    feedback: "OPEN_LOOP"

    # Softer maximum speeds.
    max_velocity: [0.20, 0.0, 0.22]
    min_velocity: [0.0, 0.0, -0.22]

    # Softer acceleration and deceleration.
    max_accel: [0.12, 0.0, 0.35]
    max_decel: [-0.22, 0.0, -0.45]

    odom_topic: /odom
    odom_duration: 0.1

    # Added angular deadband.
    # Small heading corrections below 0.04 rad/s are ignored.
    # This helps prevent tiny left-right twitching.
    deadband_velocity: [0.01, 0.0, 0.04]

    velocity_timeout: 0.5


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false

      global_frame: map
      robot_base_frame: base_footprint

      update_frequency: 1.0
      publish_frequency: 1.0
      transform_tolerance: 0.5

      resolution: 0.05
      track_unknown_space: true

      footprint: "[[0.45, 0.30], [0.45, -0.30], [-0.45, -0.30], [-0.45, 0.30]]"
      footprint_padding: 0.05

      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.20
        cost_scaling_factor: 3.0

      always_send_full_costmap: true


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false

      global_frame: odom
      robot_base_frame: base_footprint

      update_frequency: 10.0
      publish_frequency: 5.0
      transform_tolerance: 0.5

      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05

      footprint: "[[0.45, 0.30], [0.45, -0.30], [-0.45, -0.30], [-0.45, 0.30]]"
      footprint_padding: 0.05

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan

        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.20
        cost_scaling_factor: 3.0

      always_send_full_costmap: true