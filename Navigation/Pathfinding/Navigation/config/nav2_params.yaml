planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      tolerance: 0.25                         # may be 0.25 meters away from the goal
      allow_unknown: false                    # may not plan through spaces that are unknown
      max_iterations: 1000000                 
      max_on_approach_iterations: 1000
      max_planning_time: 5.0                  # needs to be changed later to 1.5 seconds

      motion_model_for_search: "DUBIN"        # change to REEDS_SHEPP to allow backwards driving
      angle_quantization_bins: 72             # 360/72 = 5 degrees per turn //adjust of comp too heavy
      minimum_turning_radius: 0.20            

      reverse_penalty: 2.0
      change_penalty: 0.2
      non_straight_penalty: 1.2
      cost_penalty: 2.0                       # penalties to make sure a smoother motion is prefered

      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0 
      lookup_table_size: 20.0
      smooth_path: true

controller_server:
  ros__parameters:
    use_sim_time: false                               # when Gazebo use: TRUE

    controller_frequency: 10.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001               # values at which they are considered to be 0

    progress_checker_plugin: "progress_checker"       # string
    goal_checker_plugins: ["general_goal_checker"]    # list of strings
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.01                  # change later to 5cm for the wheelchair to be making "progress"
      movement_time_allowance: 120.0                  # time it waits before registering failure --> reduce later

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"             # samples possible velocity commands and chooses the best one based on critics

      debug_trajectory_details: false                 # If true, publishes detailed scoring info for each sampled trajectory


      min_vel_x: 0.0                                  # 0.0 means no reverse driving, use a negative value to allow reversing
      min_vel_y: 0.0 
                               
      max_vel_x: 0.25                                 # M/s --> 0.9km/h increase for faster driving
      max_vel_y: 0.0                                  
      max_vel_theta: 0.5                              # max rotational velocity, increase for faster turning

      min_speed_xy: 0.0                               # 0.0 so the wheelchair is allowed to stop
      max_speed_xy: 0.25                              # should match max_vel_x for forward-only wheelchair
      min_speed_theta: 0.0                            # min rotation speed

      acc_lim_x: 0.3                                  # Maximum forward acceleration in m/s²
      acc_lim_y: 0.0    
      acc_lim_theta: 0.8                              # rad/s²

      decel_lim_x: -0.3                               # more negative --> harder breaking m/s²
      decel_lim_y: 0.0                                
      decel_lim_theta: -0.8                           # rad/s²

      vx_samples: 20                                  # Number of forward velocity samples tests, Higher = better choice of speed, but more CPU load.
      vy_samples: 1                                   # sideways not possible
      vtheta_samples: 20          

      sim_time: 1.5                                   # simulates each velocity command 1.5 s ahead; higher = more foresight, more CPU.
      linear_granularity: 0.05                        # checks trajectory every 0.05 m; lower = more accurate, more CPU.
      angular_granularity: 0.025                      # checks rotation every 0.025 rad; lower = more accurate, more CPU.
      transform_tolerance: 0.2                        # Allows 0.2 s TF delay; increase if TF timing errors occur.

      xy_goal_tolerance: 0.25                         # Goal accepted within 0.25 m
      trans_stopped_velocity: 0.05                    # Below 0.05 m/s counts as stopped; higher = stops sooner.
      short_circuit_trajectory_evaluation: true       # Stops scoring bad trajectories early; true = faster, less detailed.
      stateful: true                                  # Keeps controller state near goal; true = smoother goal behaviour.

      critics:                                       # Critics are scoring functions used to choose the best trajectory.
        - RotateToGoal                               # Scores rotation near the goal.
        - Oscillation                                # Penalizes unstable back-and-forth movement.
        - BaseObstacle                               # Penalizes trajectories close to obstacles.
        - GoalAlign                                  # Scores whether the wheelchair points toward the goal.
        - PathAlign                                  # Scores whether the wheelchair aligns with the global path.
        - PathDist                                   # Scores distance from the global path.
        - GoalDist                                   # Scores distance to the goal.

      BaseObstacle.scale: 0.02                       # Obstacle avoidance weight; higher = safer clearance, may block narrow spaces.

      PathAlign.scale: 32.0                          # Path direction weight; higher = follows global path direction more strictly.
      PathAlign.forward_point_distance: 0.1          # Uses point 0.1 m ahead for path alignment; higher = smoother, less tight.

      GoalAlign.scale: 24.0                          # Goal-facing weight; higher = turns more toward the goal direction.
      GoalAlign.forward_point_distance: 0.1          # Uses point 0.1 m ahead for goal alignment; higher = smoother final approach.

      PathDist.scale: 32.0                           # Path distance weight; higher = stays closer to the global path.
      GoalDist.scale: 24.0                           # Goal distance weight; higher = moves more directly toward the goal.

      RotateToGoal.scale: 32.0                       # Final rotation weight; higher = prioritizes final heading more.
      RotateToGoal.slowing_factor: 5.0               # Slows rotation near goal by factor 5.0; higher = slower final rotation.
      RotateToGoal.lookahead_time: -1.0              # RotateToGoal lookahead; -1.0 = use default behavior.


bt_navigator:
  ros__parameters:
    use_sim_time: false

    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom

    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    navigators: ["navigate_to_pose"]

    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"


behavior_server:
  ros__parameters:
    use_sim_time: false

    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    cycle_frequency: 10.0

    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]

    spin:
      plugin: "nav2_behaviors::Spin"

    backup:
      plugin: "nav2_behaviors::BackUp"

    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"

    wait:
      plugin: "nav2_behaviors::Wait"

    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.2

    simulate_ahead_time: 2.0
    max_rotational_vel: 0.5
    min_rotational_vel: 0.05
    rotational_acc_lim: 1.0


velocity_smoother:
  ros__parameters:
    use_sim_time: false

    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    max_velocity: [0.25, 0.0, 0.5]
    min_velocity: [0.0, 0.0, -0.5]

    max_accel: [0.3, 0.0, 0.8]
    max_decel: [-0.3, 0.0, -0.8]

    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false

      global_frame: map
      robot_base_frame: base_footprint

      update_frequency: 1.0
      publish_frequency: 1.0
      transform_tolerance: 0.5

      resolution: 0.05
      track_unknown_space: true

      robot_radius: 0.45

      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.2
        cost_scaling_factor: 2.0

      always_send_full_costmap: true


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false

      global_frame: odom
      robot_base_frame: base_footprint

      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 0.5

      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05

      robot_radius: 0.45

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan

        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0
          raytrace_min_range: 0.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.65
        cost_scaling_factor: 2.0

      always_send_full_costmap: true