slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint

    # Input
    scan_topic: /scan
    mode: mapping

    # Map resolution
    # 0.005 is too fine for your lidar/noise.
    resolution: 0.03

    # Laser
    # Your lidar is not really giving useful 50 m data.
    # RPLIDAR C1 is around 12 m max useful range.
    max_laser_range: 12.0
    minimum_time_interval: 0.0
    throttle_scans: 1

    # TF
    transform_publish_period: 0.02
    transform_timeout: 1.0
    tf_buffer_duration: 30.0

    # Map update
    map_update_interval: 1.0

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: false

    # Do not add a new scan for every tiny movement
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.035

    # Keep enough scans for matching, but not too many
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 8.0

    # Local scan matching
    link_match_minimum_response_fine: 0.25
    link_scan_maximum_distance: 1.0

    # Loop closure
    do_loop_closing: true
    loop_search_maximum_distance: 2.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 1.0
    loop_match_minimum_response_coarse: 0.45
    loop_match_minimum_response_fine: 0.55

    # Correlation search: small correction only
    correlation_search_space_dimension: 0.20
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.03

    # Loop search
    loop_search_space_dimension: 4.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Penalties: trust odom more
    distance_variance_penalty: 1.0
    angle_variance_penalty: 2.0
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.7

    # Angle search
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.1745
    coarse_angle_resolution: 0.01745

    use_response_expansion: true
    debug_logging: false