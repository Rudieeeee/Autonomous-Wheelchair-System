slam_toolbox:
  ros__parameters:
    use_sim_time: false

    odom_frame: odom
    map_frame: map
    base_frame: base_footprint

    scan_topic: /scan
    mode: mapping

    resolution: 0.05

    max_laser_range: 12.0

    minimum_time_interval: 0.0
    throttle_scans: 1

    transform_publish_period: 0.05
    transform_timeout: 0.2
    tf_buffer_duration: 20.0

    map_update_interval: 1.0

    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.04
    minimum_travel_heading: 0.025

    scan_buffer_size: 25
    scan_buffer_maximum_scan_distance: 12.0

    link_match_minimum_response_fine: 0.45
    link_scan_maximum_distance: 3.5

    # Loop closing - more active, but not too aggressive
    do_loop_closing: true
    loop_search_maximum_distance: 12.0
    loop_match_minimum_chain_size: 3
    loop_match_maximum_variance_coarse: 4.0
    loop_match_minimum_response_coarse: 0.75
    loop_match_minimum_response_fine: 0.65

    correlation_search_space_dimension: 1.2
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop closure search space
    loop_search_space_dimension: 10.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.04

    distance_variance_penalty: 0.35
    angle_variance_penalty: 0.9
    minimum_angle_penalty: 0.80
    minimum_distance_penalty: 0.50

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349

    use_response_expansion: true
    debug_logging: false