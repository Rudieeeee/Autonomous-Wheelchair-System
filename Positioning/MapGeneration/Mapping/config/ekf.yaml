ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.2
    two_d_mode: true

    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    print_diagnostics: true

    # Wheel odometry from Arduino node
    odom0: /wheel/odom

    # Config order:
    # x, y, z,
    # roll, pitch, yaw,
    # vx, vy, vz,
    # vroll, vpitch, vyaw,
    # ax, ay, az
    odom0_config: [
      true,  true,  false,
      false, false, true,
      true,  false, false,
      false, false, true,
      false, false, false
    ]

    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10
    odom0_nodelay: false

    # IMU from Arduino node
    imu0: /imu/data

    # First safe setup:
    # Only fuse gyro yaw rate from the IMU.
    # Do NOT fuse absolute yaw yet because BNO055 yaw can be magnetically wrong.
    imu0_config: [
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, true,
      false, false, false
    ]

    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_nodelay: false
    imu0_remove_gravitational_acceleration: true

    use_control: false