amcl:
  ros__parameters:
    use_sim_time: false

    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_footprint

    # New merged LiDAR scan from ros2_laser_scan_merger_multi
    scan_topic: /scan_multi

    set_initial_pose: false

    min_particles: 2000
    max_particles: 10000
    resample_interval: 1

    update_min_d: 0.02
    update_min_a: 0.02

    transform_tolerance: 1.0

    # RPLIDAR C1 range
    laser_min_range: 0.05
    laser_max_range: 12.0
    max_beams: 180

    alpha1: 0.3
    alpha2: 0.3
    alpha3: 0.3
    alpha4: 0.3
    alpha5: 0.3

    robot_model_type: nav2_amcl::DifferentialMotionModel
    laser_model_type: likelihood_field

    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0

    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9