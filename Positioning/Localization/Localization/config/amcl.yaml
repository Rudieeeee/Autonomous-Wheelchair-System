amcl:
  ros__parameters:
    use_sim_time: false

    # Frame names
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_footprint

    # Input laser scan topic
    scan_topic: /scan

    # For unknown start location, do not force one fixed initial pose
    set_initial_pose: false

    # Particle filter settings
    # Higher particle count helps AMCL search the whole map
    min_particles: 2000
    max_particles: 10000
    resample_interval: 1

    # Motion update thresholds
    # Low values make AMCL update often while replaying data
    update_min_d: 0.02
    update_min_a: 0.02

    # Transform timing
    transform_tolerance: 1.0

    # Laser settings
    laser_min_range: 0.1
    laser_max_range: 50.0
    max_beams: 180

    # Odometry noise model
    # Slightly higher values mean AMCL trusts odometry less
    alpha1: 0.1
    alpha2: 0.3
    alpha3: 0.1
    alpha4: 0.3
    alpha5: 0.3

    # Robot and laser model
    robot_model_type: nav2_amcl::DifferentialMotionModel
    laser_model_type: likelihood_field

    # Laser likelihood model parameters
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0

    # Beam skipping
    do_beamskip: true