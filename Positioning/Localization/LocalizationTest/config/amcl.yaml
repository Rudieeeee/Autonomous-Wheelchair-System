amcl:
  ros__parameters:
    use_sim_time: false

    # ================================
    # Frames
    # ================================
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    tf_broadcast: true
    transform_tolerance: 1.0

    # ================================
    # Topics
    # ================================
    scan_topic: "/scan"
    map_topic: "map"
    first_map_only: false

    # ================================
    # Initial pose
    # Use RViz 2D Pose Estimate
    # ================================
    set_initial_pose: false
    always_reset_initial_pose: false

    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

    # ================================
    # Motion model
    # Increase alpha = trust odom less
    # This helps when replay/tick odom is drifting or imperfect.
    # ================================
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    alpha1: 0.35
    alpha2: 0.25
    alpha3: 0.35
    alpha4: 0.25
    alpha5: 0.20

    # ================================
    # Particle filter
    # More particles = better global search and recovery.
    # Still not insane for CPU.
    # ================================
    min_particles: 1500
    max_particles: 8000
    resample_interval: 1

    pf_err: 0.03
    pf_z: 0.99
    random_seed: -1

    recovery_alpha_fast: 0.10
    recovery_alpha_slow: 0.001

    save_pose_rate: 0.5

    # ================================
    # Update very often
    # ================================
    update_min_d: 0.01
    update_min_a: 0.01

    # ================================
    # Laser model
    # For scan matching, this is usually the best AMCL model.
    # ================================
    laser_model_type: "likelihood_field_prob"

    laser_min_range: 0.10
    laser_max_range: 12.0

    max_beams: 240

    # Bigger likelihood distance helps if scan/map are slightly shifted.
    laser_likelihood_max_dist: 3.0

    # Strongly trust real scan hits.
    z_hit: 0.90
    z_rand: 0.10

    # Defined for completeness.
    z_short: 0.02
    z_max: 0.02

    # Lower sigma = sharper matching.
    # If particles jump too much, raise to 0.15 or 0.20.
    sigma_hit: 0.10
    lambda_short: 0.10

    # ================================
    # Beam skipping
    # Good for dynamic obstacles / mismatching beams.
    # ================================
    do_beamskip: true
    beam_skip_distance: 0.75
    beam_skip_threshold: 0.25
    beam_skip_error_threshold: 0.95

    # ================================
    # Lifecycle / QoS
    # ================================
    introspection_mode: "disabled"
    bond_heartbeat_period: 0.25
    allow_parameter_qos_overrides: true